<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.35);
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #instruction {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #instruction span {
      color: #f59e0b;
      font-weight: 600;
    }

    #selection {
      position: fixed;
      border: 2px solid #f59e0b;
      background: rgba(245, 158, 11, 0.08);
      display: none;
      pointer-events: none;
    }

    #size-label {
      position: fixed;
      background: rgba(0,0,0,0.7);
      color: #f59e0b;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="instruction">
    Drag to select the <span>card area</span> — press <span>Esc</span> to cancel
  </div>
  <div id="selection"></div>
  <div id="size-label"></div>

  <script>
    const sel       = document.getElementById('selection');
    const instr     = document.getElementById('instruction');
    const sizeLabel = document.getElementById('size-label');

    let startX = 0, startY = 0, dragging = false;

    document.addEventListener('mousedown', (e) => {
      startX   = e.clientX;
      startY   = e.clientY;
      dragging = true;
      instr.style.display = 'none';
      sel.style.display   = 'block';
      sizeLabel.style.display = 'block';
      sel.style.left   = startX + 'px';
      sel.style.top    = startY + 'px';
      sel.style.width  = '0';
      sel.style.height = '0';
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const x = Math.min(e.clientX, startX);
      const y = Math.min(e.clientY, startY);
      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);

      sel.style.left   = x + 'px';
      sel.style.top    = y + 'px';
      sel.style.width  = w + 'px';
      sel.style.height = h + 'px';

      sizeLabel.style.left = (x + 4) + 'px';
      sizeLabel.style.top  = (y + 4) + 'px';
      sizeLabel.textContent = `${w} × ${h}`;
    });

    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;

      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);

      if (w > 20 && h > 20) {
        window.selector.sendRegion({
          x:      Math.round(Math.min(e.screenX, startX + window.screenX)),
          y:      Math.round(Math.min(e.screenY, startY + window.screenY)),
          width:  Math.round(w),
          height: Math.round(h),
        });
      } else {
        window.selector.sendRegion(null); // too small — treat as cancel
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.selector.sendRegion(null);
    });
  </script>
</body>
</html>
